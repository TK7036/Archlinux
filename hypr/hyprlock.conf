background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.2
    brightness = 0.6
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}



# ⏰ 时间（稍微放大 + 上移）
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(255, 255, 255, 0.6)
    font_size = 110
    font_family = Sans
    position = 0, 440   # ⬆️ 上移（原来更靠下）
    halign = center
    valign = center
}

# 📅 日期（中文 + 上移）
label {
    monitor =
#    text = cmd[update:60000] echo "$(date '+%m月%d日 %A')"
    text = cmd[update:60000] LANG=zh_CN.UTF-8 date '+%m月%d日 %A'
    color = rgba(210, 210, 210, 1.0)
    font_size = 20
    font_family = Sans
    position = 0, 350   # ⬆️ 跟着时间一起上移
    halign = center
    valign = center
}

# 🔑 输入框（不动）
input-field {
    monitor =
    size = 250, 40
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true

    outer_color = rgba(255, 255, 255, 0.15)
    inner_color = rgba(255, 255, 255, 0.05)
    font_color = rgba(255, 255, 255, 1.0)

    fade_on_empty = false
    placeholder_text = <i>输入密码</i>

    position = 0, -100  # ❗保持不变
    halign = center
    valign = center
}

# 🔐 错误提示
label {
    monitor =
    text = cmd[update:1000] echo "$HYPRLOCK_ERROR"
    color = rgba(255, 80, 80, 1.0)
    font_size = 20
    font_family = Sans
    position = 0, -150
    halign = center
    valign = center
}
